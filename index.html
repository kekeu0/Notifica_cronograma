<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
<link rel="stylesheet" href="style.css" />
    <title>CronoFy</title>
</head>
<body>
    <div id="tits">
        <h1 id="titulo">CronoFy</h1>
        <h3 id="subt">Notificando seu cronograma</h3>
    </div>

    <div id="addT">
        <input class="input-task" type="text" placeholder="Digite sua tarefa...">
        <input class="input-time" type="time" name="hour" id="hora">
        <button class="add-task">ADICIONAR TAREFA</button>
    </div>

    <div id="texto2">
        <h4>Tarefas</h4>
        <h4>Horários</h4>
    </div>

    <div id="tList">
        <ul>
            <li class="tarefa">
                <div class="dcheck">
                    <img src="assets/close_76dp_E8EAED_FILL0_wght400_GRAD0_opsz48.png" alt="Fechar">
                    <img src="assets/check_box_outline_blank_76dp_E8EAED_FILL0_wght400_GRAD0_opsz48.png" alt="Caixa de Check">
                </div>
                <p class="ltask">Editar vídeo Delta Force</p>
                <p class="ltime">09:00</p>
            </li> 
            <li class="tarefa">
                <div class="dcheck">
                    <img src="assets/close_76dp_E8EAED_FILL0_wght400_GRAD0_opsz48.png" alt="Fechar">
                    <img src="assets/check_box_outline_blank_76dp_E8EAED_FILL0_wght400_GRAD0_opsz48.png" alt="Caixa de Check">
                </div>
                <p class="ltask">Programar</p>
                <p class="ltime">09:00</p>
            </li> 
        </ul>
    </div>

    <aside id="menuLat">
        <img src="assets/notifications_76dp_E8EAED_FILL0_wght400_GRAD0_opsz48.png" alt="Notificação Ativa">
        <img src="assets/settings_76dp_E8EAED_FILL0_wght400_GRAD0_opsz48.png" alt="Configurações">
    </aside>
    
    <script src="renderer.js"></script>
</body>
</html>
